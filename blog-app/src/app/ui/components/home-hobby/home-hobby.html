<section id="hobby">
  <div class="hobby-header">
    <h2>Hobby projects</h2>
    <p>
      Duis nisi do exercitation in irure aliqua commodo nisi eu id reprehenderit dolore fugiat
      consectetur irure labore est ea.
    </p>
  </div>
  <div class="hobby-grid">
    @for (project of projects(); track project.label) {
      <div class="hobby-card">
        <img [src]="project.image" [alt]="project.label" />
        <div class="hobby-overlay">
          <p>{{ project.label }}</p>
        </div>
      </div>
    }

    <div class="hobby-stack">
      @for (item of stack(); track item.label) {
        <div class="hobby-card">
          <img [src]="item.image" [alt]="item.label" />
          <div class="hobby-overlay">
            <p>{{ item.label }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
